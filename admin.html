<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت کافه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'Vazir', sans-serif;
        }

        body {
            background: #1a1a1a;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
        }

        .login-title {
            text-align: center;
            color: #8B4513;
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0d6cc;
            border-radius: 15px;
        }

        .login-btn {
            width: 100%;
            background: #8B4513;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        .admin-panel {
            background: white;
            border-radius: 30px;
            padding: 30px;
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-header h2 {
            color: #8B4513;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-tab {
            background: #f0f0f0;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            flex: 1;
            text-align: center;
        }

        .admin-tab.active {
            background: #8B4513;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .admin-form {
            background: #f8f4f0;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0d6cc;
            border-radius: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .save-btn {
            background: #8B4513;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            cursor: pointer;
        }

        .items-list {
            background: #f8f4f0;
            border-radius: 20px;
            padding: 20px;
        }

        .item-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .edit-btn {
            background: #ffc107;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container" id="loginPage">
            <div class="login-logo">☕</div>
            <h2 class="login-title">پنل مدیریت کافه</h2>
            <input type="text" class="login-input" id="username" placeholder="نام کاربری" value="admin">
            <input type="password" class="login-input" id="password" placeholder="رمز عبور" value="123456">
            <button class="login-btn" onclick="login()">ورود به پنل</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="admin-header">
                <h2>⚙️ پنل مدیریت کافه</h2>
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>

            <div class="admin-tabs">
                <div class="admin-tab active" onclick="switchTab('menu')">📋 منو</div>
                <div class="admin-tab" onclick="switchTab('memories')">💬 یادگاری‌ها</div>
            </div>

            <div class="tab-content active" id="menuTab">
                <div class="admin-form">
                    <h3>➕ افزودن آیتم جدید</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>عنوان</label>
                            <input type="text" id="itemTitle">
                        </div>
                        <div class="form-group">
                            <label>قیمت</label>
                            <input type="number" id="itemPrice">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>دسته‌بندی</label>
                        <select id="itemCategory">
                            <option value="قهوه">قهوه</option>
                            <option value="کیک">کیک</option>
                        </select>
                    </div>
                    <button class="save-btn" onclick="addItem()">ذخیره</button>
                </div>
                <div class="items-list" id="menuList"></div>
            </div>

            <div class="tab-content" id="memoriesTab">
                <div class="items-list" id="memoriesList"></div>
            </div>
        </div>
    </div>

    <script>
        let menuItems = [
            { id: 1, title: 'اسپرسو', price: 45000, category: 'قهوه' }
        ];

        let memories = [
            { id: 1, text: 'یادگاری نمونه', date: '۱۴۰۳/۱۲/۰۱', name: 'علی' }
        ];

        function login() {
            if (document.getElementById('username').value === 'admin' && 
                document.getElementById('password').value === '123456') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadMenu();
                loadMemories();
            } else {
                alert('اطلاعات اشتباه است');
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('active');
        }

        function switchTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function loadMenu() {
            let html = '';
            menuItems.forEach(item => {
                html += `
                    <div class="item-card">
                        <span>${item.title} - ${item.price} تومان</span>
                        <div>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">حذف</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('menuList').innerHTML = html;
        }

        function addItem() {
            const title = document.getElementById('itemTitle').value;
            const price = document.getElementById('itemPrice').value;
            if (!title || !price) return;
            
            menuItems.push({
                id: Date.now(),
                title: title,
                price: parseInt(price),
                category: document.getElementById('itemCategory').value
            });
            
            loadMenu();
            document.getElementById('itemTitle').value = '';
            document.getElementById('itemPrice').value = '';
        }

        function deleteItem(id) {
            menuItems = menuItems.filter(i => i.id !== id);
            loadMenu();
        }

        function loadMemories() {
            let html = '';
            memories.forEach(memory => {
                html += `<div class="item-card">${memory.text} - ${memory.date}</div>`;
            });
            document.getElementById('memoriesList').innerHTML = html;
        }
    </script>
</body>
</html>
